<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Bill - Simple Billing & Payments</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23ffffff'/><rect x='15' y='15' width='25' height='25' rx='4' fill='%23000000'/><rect x='60' y='15' width='25' height='25' rx='4' fill='%23000000'/><rect x='15' y='60' width='25' height='25' rx='4' fill='%23000000'/><rect x='22' y='22' width='11' height='11' rx='2' fill='%23ffffff'/><rect x='67' y='22' width='11' height='11' rx='2' fill='%23ffffff'/><rect x='22' y='67' width='11' height='11' rx='2' fill='%23ffffff'/><rect x='50' y='50' width='6' height='6' fill='%23000000'/><rect x='60' y='50' width='6' height='6' fill='%23000000'/><rect x='70' y='50' width='6' height='6' fill='%23000000'/><rect x='50' y='60' width='6' height='6' fill='%23000000'/><rect x='60' y='60' width='6' height='6' fill='%23000000'/><rect x='70' y='60' width='6' height='6' fill='%23000000'/><rect x='50' y='70' width='6' height='6' fill='%23000000'/><rect x='60' y='70' width='6' height='6' fill='%23000000'/><rect x='70' y='70' width='6' height='6' fill='%23000000'/><rect x='50' y='80' width='6' height='6' fill='%23000000'/><rect x='60' y='80' width='6' height='6' fill='%23000000'/><rect x='70' y='80' width='6' height='6' fill='%23000000'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>QR Bill</h1>
            <p class="subtitle">Simple Billing & Payments</p>
        </div>

        <div class="merchant-panel">
            <p class="panel-title">Create a New Bill</p>

            <div class="form-group">
                <label for="itemName">Item Name</label>
                <input type="text" id="itemName" placeholder="What was sold?">
            </div>

            <div class="form-group">
                <label for="amount">Amount (₹)</label>
                <input type="number" id="amount" placeholder="0.00" step="0.01">
            </div>

            <div class="form-group">
                <label for="phoneNumber">Customer Phone</label>
                <input type="tel" id="phoneNumber" placeholder="10-digit mobile number" pattern="[0-9]{10}">
            </div>

            <div class="form-group">
                <label for="customerName">Customer Name</label>
                <input type="text" id="customerName" placeholder="Optional">
            </div>

            <button class="btn-primary" onclick="generateBill()">Generate Bill</button>

            <div id="qrSection" class="qr-section hidden">
                <h3>Scan to Pay</h3>
                <canvas id="qrcode"></canvas>
                <p class="qr-hint">Show this QR code to the customer</p>
                <button class="btn-secondary" onclick="printBill()">Print Bill</button>
            </div>

            <div id="billSection" class="bill-section hidden">
                <div id="billContent"></div>
            </div>
        </div>

        <div class="footer">
            Designed & Developed by Awaizalam
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
